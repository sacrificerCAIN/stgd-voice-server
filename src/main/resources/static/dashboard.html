<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%220.9em%22  font-size=%2290%22>🐔</text></svg>">
    <title>dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            position: relative;
            min-height: 100vh;
        }

        .header-container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto 20px;
        }

        .logout-btn {
            position: absolute;
            top: 30px;
            right: 0;
            padding: 8px 15px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            z-index: 10;
        }

        .logout-btn:hover {
            background-color: #d32f2f;
        }

        .chat-btn {
            position: absolute;
            top: 30px;
            right: 85px;
            padding: 8px 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            z-index: 10;
        }

        .chat-btn:hover {
            background-color: #0b7dda;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        button.danger {
            background-color: #f44336;
        }

        button.danger:hover {
            background-color: #d32f2f;
        }

        button.secondary {
            background-color: #2196F3;
        }

        button.secondary:hover {
            background-color: #0b7dda;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        #message {
            margin: 15px 0;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }

        .success {
            background-color: #dff0d8;
            color: #3c763d;
            display: block;
        }

        .error {
            background-color: #f2dede;
            color: #a94442;
            display: block;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        /* 系统日志样式 */
        .log-container {
            max-width: 1200px;
            margin: 20px auto 0;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .log-header h2 {
            margin: 0;
            font-size: 18px;
        }

        .log-status {
            font-size: 13px;
            padding: 3px 8px;
            border-radius: 4px;
            color: white;
        }

        .log-status.connected {
            background-color: #4CAF50;
        }

        .log-status.disconnected {
            background-color: #f44336;
        }

        .log-status.connecting {
            background-color: #ff9800;
        }

        #logBox {
            width: 100%;
            height: 320px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            background-color: #1e1e1e;
            color: #e6e6e6;
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            cursor: default;
            outline: none;
        }

        .log-entry {
            margin-bottom: 4px;
        }

        .log-entry .log-time {
            color: #9cdcfe;
        }

        .log-entry .log-level {
            color: #dcdcaa;
            margin-right: 4px;
        }

        .log-entry.login .log-level { color: #4ec9b0; }
        .log-entry.logout .log-level { color: #ce9178; }
        .log-entry.join .log-level { color: #b5cea8; }
        .log-entry.leave .log-level { color: #c586c0; }
        .log-entry.room .log-level { color: #569cd6; }
        .log-entry.system .log-level { color: #d7ba7d; }

        .log-clear-btn {
            padding: 4px 10px;
            font-size: 12px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .log-clear-btn:hover {
            background-color: #d32f2f;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 50%;
            max-width: 500px;
            border-radius: 5px;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: black;
        }

        .modal-header {
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
            margin-bottom: 15px;
        }

        .modal-footer {
            padding: 10px 0;
            border-top: 1px solid #ddd;
            margin-top: 15px;
            text-align: right;
        }
    </style>
</head>
<body>
<!-- 添加登出按钮容器 -->
<div class="header-container">
    <button class="chat-btn" onclick="gotoChat()">聊天室</button>
    <button class="logout-btn" onclick="confirmLogout()">登出</button>
</div>

<div class="container">
    <h1>房间管理</h1>

    <div id="message"></div>

    <button type="button" onclick="openModal()">添加房间</button>
    <button type="button" class="secondary" onclick="loadRooms()">刷新列表</button>

    <h2>房间列表</h2>
    <table id="roomTable">
        <thead>
        <tr>
            <th>名称</th>
            <th>在线人数</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <!-- 数据将通过JavaScript动态加载 -->
        </tbody>
    </table>
</div>

<!-- 系统日志 -->
<div class="log-container">
    <div class="log-header">
        <h2>系统日志</h2>
        <div>
            <span id="wsStatus" class="log-status disconnected">未连接</span>
            <button type="button" class="log-clear-btn" onclick="clearLog()">清空</button>
        </div>
    </div>
    <textarea id="logBox" readonly></textarea>
</div>

<!-- 弹窗 -->
<div id="roomModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">添加房间</h2>
        </div>
        <form id="roomForm">
            <input type="hidden" id="roomId">
            <div class="form-group">
                <label for="roomName">房间名称</label>
                <input type="text" id="roomName" required>
                <label for="password">房间密码</label>
                <input type="password" id="password"  onclick="cleanPassword()" required>
            </div>
        </form>
        <div class="modal-footer">
            <button type="button" onclick="submitRoom()">保存</button>
            <button type="button" class="secondary" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
    // 添加登出确认函数
    function confirmLogout() {
        if (confirm('确定要退出登录吗？')) {
            logout();
        }
    }

    // 跳转到chat页面
    function gotoChat() {
        window.location.href = '/chat.html';
    }

    // 登出函数
    function logout() {
        // 这里可以添加登出逻辑，如清除session等
        // 然后跳转到index.html
        fetch('http://localhost:8080/login/logout', {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        window.location.href = 'index.html';
    }

    // 页面加载时自动获取Room列表
    window.onload = function() {
        init();
    };

    // 显示消息
    function showMessage(message, isSuccess) {
        const messageEl = document.getElementById('message');
        messageEl.textContent = message;
        messageEl.className = isSuccess ? 'success' : 'error';
        setTimeout(() => {
            messageEl.style.display = 'none';
        }, 3000);
    }

    // 打开弹窗
    function openModal(room = null) {
        const modal = document.getElementById('roomModal');
        const modalTitle = document.getElementById('modalTitle');

        if (room) {
            modalTitle.textContent = '编辑房间';
            document.getElementById('roomId').value = room.id;
            document.getElementById('roomName').value = room.name;
            if (room.password != null && room.password != ''){
                document.getElementById('password').setAttribute("placeholder", "点击保存清除该房间密码，点击取消维持原密码");
            }

            document.getElementById('password').value = room.password;
        } else {
            modalTitle.textContent = '添加房间';
            document.getElementById('roomForm').reset();
            document.getElementById('roomId').value = '';
        }

        modal.style.display = 'block';
    }

    // 关闭弹窗
    function closeModal() {
        document.getElementById('roomModal').style.display = 'none';
    }

    // 点击弹窗外部关闭
    window.onclick = function(event) {
        const modal = document.getElementById('roomModal');
        if (event.target == modal) {
            closeModal();
        }
    }

    // 加载所有房间
    function loadRooms() {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'http://localhost:8080/room/getAllRoom', true);
        xhr.setRequestHeader('Content-Type', 'application/json');

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    const rooms = JSON.parse(xhr.responseText);
                    renderRoomTable(rooms);
                } else {
                    showMessage('获取房间列表失败: ' + xhr.status, false);
                }
            }
        };

        // 发送空对象作为请求体
        xhr.send(JSON.stringify({}));
    }

    // 渲染房间表格
    function renderRoomTable(rooms) {
        const tbody = document.querySelector('#roomTable tbody');
        tbody.innerHTML = '';

        rooms.forEach(room => {
            const row = document.createElement('tr');

            const nameCell = document.createElement('td');

            if (room.password != null && room.password != ''){
                nameCell.textContent = "🔒" + room.name;
            }else {
                nameCell.textContent = room.name;
            }

            row.appendChild(nameCell);

            const userNumCell = document.createElement('td');
            userNumCell.textContent = room.userNum;
            row.appendChild(userNumCell);

            const actionCell = document.createElement('td');
            actionCell.className = 'action-buttons';

            const editBtn = document.createElement('button');
            editBtn.textContent = '编辑';
            editBtn.className = 'secondary';
            editBtn.onclick = () => openModal(room);
            actionCell.appendChild(editBtn);

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '删除';
            deleteBtn.className = 'danger';
            deleteBtn.onclick = () => confirmDeleteRoom(room.id, room.name, room.userNum);
            actionCell.appendChild(deleteBtn);

            row.appendChild(actionCell);
            tbody.appendChild(row);
        });
    }

    // 添加删除确认函数
    function confirmDeleteRoom(id, name, userNum) {
        if (userNum > 0){
            if (confirm(`确定要删除 "${name}" 吗？注意当前仍有"${userNum}"人在线，且此操作不可逆。`)) {
                deleteRoom(id);
            }
        }

        if (confirm(`确定要删除 "${name}" 吗？此操作不可逆。`)) {
            deleteRoom(id);
        }
    }

    // 提交房间（添加或更新）
    function submitRoom() {
        const id = document.getElementById('roomId').value;
        const name = document.getElementById('roomName').value;
        const password = document.getElementById('password').value;
        let hashedPassword = "";
        //如密码不为空且不是已加密过的sha256格式，则视为有效新密码并对其进行加密,否则为不改动原密码
        if (password != null && password != "" && !/^[a-f0-9]{64}$/i.test(password)){
            hashedPassword = sha256(password);
        }else{
            hashedPassword = password;
        }

        if (!name) {
            showMessage('房间名称不能为空', false);
            return;
        }

        const room = {
            name: name,
            password: hashedPassword
        };
        let url = 'http://localhost:8080/room/insertRoom';
        let method = '添加';

        if (id) {
            room.id = parseInt(id);
            url = 'http://localhost:8080/room/updateRoom';
            method = '更新';
        }

        const xhr = new XMLHttpRequest();
        xhr.open('POST', url, true);
        xhr.setRequestHeader('Content-Type', 'application/json');

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    const result = JSON.parse(xhr.responseText);
                    if (result > 0) {
                        showMessage(`房间${method}成功`, true);
                        closeModal();
                        loadRooms();
                    } else {
                        showMessage(`房间${method}失败`, false);
                    }
                } else {
                    showMessage(`房间${method}失败: ` + xhr.status, false);
                }
            }
        };

        xhr.send(JSON.stringify(room));
    }

    // 删除房间
    function deleteRoom(id) {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'http://localhost:8080/room/removeRoom', true);
        xhr.setRequestHeader('Content-Type', 'application/json');

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    const result = JSON.parse(xhr.responseText);
                    if (result > 0) {
                        showMessage('房间删除成功', true);
                        loadRooms();
                    } else {
                        showMessage('房间删除失败', false);
                    }
                } else {
                    showMessage('房间删除失败: ' + xhr.status, false);
                }
            }
        };

        // 发送ID作为请求参数
        xhr.send(JSON.stringify({ id: id }));
    }

    function sha256(message) {
        const hash = CryptoJS.SHA256(message);
        return hash.toString(CryptoJS.enc.Hex);
    }

    function cleanPassword(){
        document.getElementById('password').value = '';
    }

    // ============ WebSocket 系统日志 ============
    let systemLogSocket = null;
    let reconnectTimer = null;
    let reconnectDelay = 2000;
    let maxReconnectDelay = 30000;
    let manuallyClosed = false;

    function setWsStatus(status, text) {
        const el = document.getElementById('wsStatus');
        if (!el) return;
        el.className = 'log-status ' + status;
        el.textContent = text;
    }

    function formatTime(ts) {
        if (!ts) {
            ts = Date.now();
        }
        const d = new Date(ts);
        const pad = (n) => (n < 10 ? '0' + n : '' + n);
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
            ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    function appendLog(level, msg, ts) {
        const box = document.getElementById('logBox');
        if (!box) return;
        const line = '[' + formatTime(ts) + '] [' + level + '] ' + msg + '\n';
        box.value += line;
        // 自动滚动到底部
        box.scrollTop = box.scrollHeight;
    }

    function clearLog() {
        const box = document.getElementById('logBox');
        if (box) box.value = '';
    }

    function connectSystemLog() {
        manuallyClosed = false;
        // 使用当前页面的协议/主机：http -> ws, https -> wss
        const protocol = (window.location.protocol === 'https:') ? 'wss:' : 'ws:';
        const host = window.location.host || 'localhost:8080';
        const url = protocol + '//' + host + '/ws/system-log';

        try {
            setWsStatus('connecting', '连接中...');
            systemLogSocket = new WebSocket(url);
        } catch (e) {
            console.error('WebSocket 创建失败:', e);
            setWsStatus('disconnected', '连接失败');
            scheduleReconnect();
            return;
        }

        systemLogSocket.onopen = function () {
            reconnectDelay = 2000;
            setWsStatus('connected', '已连接');
            appendLog('SYSTEM', '已连接系统日志服务');
            // 连接成功后立刻拉取一次最新房间列表
            loadRooms();
        };

        systemLogSocket.onmessage = function (event) {
            try {
                const data = JSON.parse(event.data);
                const level = (data.level || 'INFO').toUpperCase();
                const msg = data.message || event.data;
                const ts = data.timestamp || Date.now();
                const type = (data.type || 'system').toLowerCase();

                // 根据事件类型决定显示前缀
                let prefix = '';
                if (type === 'login') {
                    if (data.userName) prefix = '[登录] ' + data.userName;
                } else if (type === 'logout') {
                    if (data.userName) prefix = '[登出] ' + data.userName;
                } else if (type === 'join') {
                    if (data.userName) {
                        prefix = '[加入房间] ' + data.userName +
                            (data.roomName ? ' -> ' + data.roomName : '');
                    }
                } else if (type === 'leave') {
                    if (data.userName) {
                        prefix = '[离开房间] ' + data.userName +
                            (data.roomName ? ' <- ' + data.roomName : '');
                    }
                } else if (type === 'room') {
                    // 房间增删改事件：触发刷新
                    prefix = '[房间] ' + msg;
                }

                appendLog(level, prefix || msg, ts);

                // 任何事件都可能引起房间在线人数变化，实时刷新
                if (type === 'login' || type === 'logout' ||
                    type === 'join' || type === 'leave' || type === 'room') {
                    loadRooms();
                }
            } catch (e) {
                // 如果不是 JSON，则作为普通文本追加
                appendLog('INFO', event.data);
            }
        };

        systemLogSocket.onerror = function (event) {
            console.error('WebSocket 错误:', event);
            setWsStatus('disconnected', '连接错误');
        };

        systemLogSocket.onclose = function (event) {
            setWsStatus('disconnected', '已断开');
            if (!manuallyClosed) {
                appendLog('SYSTEM', '系统日志连接已断开，' + (reconnectDelay / 1000) + 's 后尝试重连...');
                scheduleReconnect();
            }
        };
    }

    function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnectTimer = setTimeout(function () {
            reconnectTimer = null;
            // 指数退避
            reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
            connectSystemLog();
        }, reconnectDelay);
    }

    async function init() {
        try {
            const response = await fetch('http://localhost:8080/login/checkSession', {
                method: 'GET',
                credentials: 'include' // 包含cookie
            });

            const result = await response.json();

            if (result.isAuthenticated) {
                loadRooms();
                // 建立 WebSocket 连接接收系统日志
                if (window.WebSocket) {
                    connectSystemLog();
                } else {
                    appendLog('WARN', '当前浏览器不支持 WebSocket');
                }
            }else {
                // 如果没有有效会话，跳转到登录界面
                alert('会话已过期，请重新登录');
                window.location.href = '/index.html';
            }
        } catch (error) {
            console.error('检查会话错误:', error);
            window.location.href = '/index.html';
        }
    }
</script>
</body>
</html>
